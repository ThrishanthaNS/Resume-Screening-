services:
  - type: web
    name: talentrank-studio
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: PYTHONPATH=src uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_HOST
        value: 0.0.0.0
      - key: TOP_CANDIDATES_LIMIT
        value: "5"
      - key: PYTHON_VERSION
        value: 3.11.11
